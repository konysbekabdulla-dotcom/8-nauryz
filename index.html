<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Наурыз құттықтау 💐</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Шақырту блогы */
        #message {
            display: none;
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: slideUp 1s ease-out forwards;
            text-align: center;
        }

        /* Алтын калиграфия стилі */
        .calligraphy {
            font-family: 'Pacifico', cursive;
            font-size: 22px;
            line-height: 1.6;
            background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .details {
            color: #444;
            font-size: 18px;
            margin: 15px 0;
        }

        .highlight-gold {
            font-weight: bold;
            color: #b38728; /* Алтын түс */
        }

        button {
            padding: 18px 40px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff758c;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>🌸 Мерекеңізбен! 🌸</h1>
        
        <button id="btn" onclick="showMessage()">Шақыртуды ашу 💌</button>

        <div id="message">
            <div style="font-size: 40px;">🌹</div>
            <div class="calligraphy">
                Құрметті арулар мен Малика апай!
            </div>
            
            <div class="details">
                Сіздерді 8-наурыз мерекесімен құттықтаймыз! Көктемдей құлпырып жүре беріңіздер. 🌸
                <br><br>
                Сіздерді <b>ауызашарға</b> шақырамыз:
                <br>
                📅 <span class="highlight-gold">9 наурыз, 18:00</span>
                <br>
                📍 <span class="highlight-gold">“Кәусар” шайханасы</span>
            </div>

            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <div style="color:#888; font-size:14px;">Ізгі тілекпен: 11 “Ә” ұлдары</div>
        </div>
    </div>

    <script>
        function showMessage() {
            var msg = document.getElementById("message");
            var btn = document.getElementById("btn");
            var audio = document.getElementById("myAudio");

            // Музыканы қосу
            if (audio) { audio.play().catch(e => console.log("Audio error")); }

            msg.style.display = "block";
            btn.style.display = "none";

            // Конфетти
            var end = Date.now() + (3 * 1000);
            var colors = ['#ff69b4', '#bf953f', '#ffffff'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
